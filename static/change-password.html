<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 px-4">
      <a href="index.html" class="text-xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <a href="profile.html" class="text-sm text-gray-600 hover:text-indigo-600">← 返回个人中心</a>
    </div>
  </header>

  <div class="max-w-lg mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900">修改密码</h1>
    <form class="mt-6 rounded-xl border border-gray-200 bg-white p-6 space-y-4" onsubmit="event.preventDefault();alert('密码修改成功！');location.href='profile.html'">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">旧密码</label>
        <input type="password" placeholder="请输入旧密码" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" required>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
        <input type="password" placeholder="至少6位" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" required minlength="6">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">确认新密码</label>
        <input type="password" placeholder="请再次输入新密码" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" required minlength="6">
      </div>
      <button type="submit" class="w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-medium text-white hover:bg-indigo-700 transition">保存修改</button>
    </form>
  </div>
</body>
</html>
