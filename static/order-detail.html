<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单详情 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 px-4">
      <a href="index.html" class="text-xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <a href="orders.html" class="text-sm text-gray-600 hover:text-indigo-600">← 返回订单列表</a>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-8">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold text-gray-900">订单详情</h1>
      <span class="rounded-full bg-amber-100 px-3 py-1 text-sm font-medium text-amber-700">待付款</span>
    </div>
    <p class="mt-1 text-sm text-gray-500">订单号：202606221430-7842 | 下单时间：2026-06-22 14:30</p>

    <!-- Progress -->
    <div class="mt-6 flex items-center justify-between text-xs text-gray-500">
      <div class="flex flex-col items-center"><span class="flex h-8 w-8 items-center justify-center rounded-full bg-indigo-600 text-white font-bold">1</span><span class="mt-1 text-indigo-600 font-medium">下单</span></div>
      <div class="flex-1 h-0.5 bg-gray-200 mx-2"></div>
      <div class="flex flex-col items-center"><span class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-200 text-gray-400 font-bold">2</span><span class="mt-1">付款</span></div>
      <div class="flex-1 h-0.5 bg-gray-200 mx-2"></div>
      <div class="flex flex-col items-center"><span class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-200 text-gray-400 font-bold">3</span><span class="mt-1">发货</span></div>
      <div class="flex-1 h-0.5 bg-gray-200 mx-2"></div>
      <div class="flex flex-col items-center"><span class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-200 text-gray-400 font-bold">4</span><span class="mt-1">完成</span></div>
    </div>

    <!-- Address -->
    <div class="mt-6 rounded-xl border border-gray-200 bg-white p-6">
      <h3 class="font-bold text-gray-900 mb-2">收货信息</h3>
      <p class="text-sm"><span class="font-medium">张三</span> <span class="text-gray-500 ml-2">13800138000</span></p>
      <p class="text-sm text-gray-500 mt-1">北京市朝阳区建国路88号 SOHO现代城A座1201</p>
    </div>

    <!-- Items -->
    <div class="mt-4 rounded-xl border border-gray-200 bg-white p-6">
      <h3 class="font-bold text-gray-900 mb-3">商品信息</h3>
      <div class="space-y-3">
        <div class="flex gap-3 items-center"><div class="h-16 w-16 shrink-0 rounded-lg bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center text-2xl">🎧</div><div class="flex-1"><p class="text-sm font-medium">无线蓝牙耳机 Pro</p><p class="text-xs text-gray-400">x1</p></div><span class="text-sm font-bold">¥299.00</span></div>
        <div class="flex gap-3 items-center"><div class="h-16 w-16 shrink-0 rounded-lg bg-gradient-to-br from-green-100 to-green-200 flex items-center justify-center text-2xl">⌚</div><div class="flex-1"><p class="text-sm font-medium">智能手表 S8</p><p class="text-xs text-gray-400">x1</p></div><span class="text-sm font-bold">¥599.00</span></div>
      </div>
    </div>

    <!-- Total -->
    <div class="mt-4 rounded-xl border border-gray-200 bg-white p-6">
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-gray-500">商品金额</span><span>¥898.00</span></div>
        <div class="flex justify-between"><span class="text-gray-500">优惠券</span><span class="text-green-600">-¥0.00</span></div>
        <div class="flex justify-between"><span class="text-gray-500">运费</span><span class="text-green-600">免运费</span></div>
        <hr class="my-2">
        <div class="flex justify-between text-lg font-bold"><span>实付金额</span><span class="text-red-600">¥898.00</span></div>
      </div>
    </div>

    <div class="mt-4 flex gap-3 justify-end">
      <button class="rounded-lg border px-6 py-2.5 text-sm text-gray-600 hover:bg-gray-100">取消订单</button>
      <button class="rounded-lg bg-red-600 px-6 py-2.5 text-sm text-white hover:bg-red-700" onclick="alert('支付成功！')">去支付</button>
    </div>
  </div>
</body>
</html>
