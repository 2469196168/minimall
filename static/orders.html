<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的订单 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 px-4">
      <a href="index.html" class="text-xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="products.html" class="text-gray-600 hover:text-indigo-600">全部商品</a>
        <a href="cart.html" class="text-gray-600 hover:text-indigo-600">🛒 购物车</a>
        <a href="login.html" class="text-indigo-600 font-medium">登录</a>
      </nav>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900">我的订单</h1>
    <!-- Tabs -->
    <div class="mt-4 flex gap-2 flex-wrap">
      <button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white">全部</button>
      <button class="rounded-lg border px-4 py-2 text-sm text-gray-600 hover:bg-gray-100">待付款</button>
      <button class="rounded-lg border px-4 py-2 text-sm text-gray-600 hover:bg-gray-100">已付款</button>
      <button class="rounded-lg border px-4 py-2 text-sm text-gray-600 hover:bg-gray-100">已发货</button>
      <button class="rounded-lg border px-4 py-2 text-sm text-gray-600 hover:bg-gray-100">已完成</button>
    </div>

    <!-- Order Cards -->
    <div class="mt-6 space-y-4">
      <div class="rounded-xl border border-gray-200 bg-white p-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500">订单号：202606221430-7842</span>
          <span class="rounded-full bg-amber-100 px-2.5 py-0.5 text-xs font-medium text-amber-700">待付款</span>
        </div>
        <div class="space-y-2">
          <div class="flex gap-3"><div class="h-14 w-14 shrink-0 rounded-lg bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center text-xl">🎧</div><div class="flex-1"><p class="text-sm font-medium">无线蓝牙耳机 Pro</p><p class="text-xs text-gray-400">x1</p></div><span class="text-sm font-bold">¥299.00</span></div>
          <div class="flex gap-3"><div class="h-14 w-14 shrink-0 rounded-lg bg-gradient-to-br from-green-100 to-green-200 flex items-center justify-center text-xl">⌚</div><div class="flex-1"><p class="text-sm font-medium">智能手表 S8</p><p class="text-xs text-gray-400">x1</p></div><span class="text-sm font-bold">¥599.00</span></div>
        </div>
        <hr class="my-3">
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-500">共 2 件商品</span>
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500">合计：</span>
            <span class="text-lg font-bold text-red-600">¥898.00</span>
          </div>
        </div>
        <div class="mt-3 flex justify-end gap-2">
          <a href="order-detail.html" class="rounded-lg border px-4 py-1.5 text-sm text-gray-600 hover:bg-gray-100">查看详情</a>
          <button class="rounded-lg bg-red-600 px-4 py-1.5 text-sm text-white hover:bg-red-700" onclick="this.textContent='已付款';this.className='rounded-lg bg-green-600 px-4 py-1.5 text-sm text-white';this.parentElement.previousElementSibling.previousElementSibling.querySelector('span:last-child').className='rounded-full bg-blue-100 px-2.5 py-0.5 text-xs font-medium text-blue-700';this.parentElement.previousElementSibling.previousElementSibling.querySelector('span:last-child').textContent='已付款'">去支付</button>
        </div>
      </div>

      <div class="rounded-xl border border-gray-200 bg-white p-5">
        <div class="flex items-center justify-between mb-3">
          <span class="text-xs text-gray-500">订单号：202606200915-5631</span>
          <span class="rounded-full bg-green-100 px-2.5 py-0.5 text-xs font-medium text-green-700">已完成</span>
        </div>
        <div class="space-y-2">
          <div class="flex gap-3"><div class="h-14 w-14 shrink-0 rounded-lg bg-gradient-to-br from-yellow-100 to-yellow-200 flex items-center justify-center text-xl">🔌</div><div class="flex-1"><p class="text-sm font-medium">快充充电器 65W</p><p class="text-xs text-gray-400">x1</p></div><span class="text-sm font-bold">¥89.00</span></div>
        </div>
        <hr class="my-3">
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-500">共 1 件商品</span>
          <div class="flex items-center gap-3">
            <span class="text-sm text-gray-500">合计：</span>
            <span class="text-lg font-bold text-red-600">¥89.00</span>
          </div>
        </div>
        <div class="mt-3 flex justify-end gap-2">
          <a href="order-detail.html" class="rounded-lg border px-4 py-1.5 text-sm text-gray-600 hover:bg-gray-100">查看详情</a>
          <button class="rounded-lg bg-indigo-600 px-4 py-1.5 text-sm text-white hover:bg-indigo-700">去评价</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
