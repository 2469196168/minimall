<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品管理 - Mini Mall Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex">
    <aside class="hidden lg:block fixed left-0 top-0 h-screen w-60 bg-gray-900 text-white">
      <div class="flex h-16 items-center border-b border-gray-700 px-6">
        <a href="index.html" class="text-lg font-bold">🛍️ Mini Mall Admin</a>
      </div>
      <nav class="mt-4 space-y-1 px-3">
        <a href="admin.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📊 数据面板</a>
        <a href="admin-products.html" class="flex items-center gap-3 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm">📦 商品管理</a>
        <a href="admin-categories.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📂 分类管理</a>
        <a href="admin-orders.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📋 订单管理</a>
        <a href="admin-users.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">👥 用户管理</a>
        <a href="admin-coupons.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">🎫 优惠券管理</a>
        <a href="admin-banners.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">🖼️ 轮播管理</a>
        <a href="admin-reviews.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">⭐ 评价管理</a>
      </nav>
      <div class="absolute bottom-4 left-0 w-full px-3">
        <a href="index.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white">← 返回商城</a>
      </div>
    </aside>

    <main class="flex-1 lg:ml-60 p-4 lg:p-8">
      <header class="flex items-center justify-between bg-white rounded-xl border px-4 lg:px-8 py-4 mb-6">
        <h1 class="text-lg font-semibold text-gray-800">📦 商品管理</h1>
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm text-white hover:bg-indigo-700" onclick="alert('新增商品（演示）')">+ 新增商品</button>
      </header>

      <div class="rounded-xl border border-gray-200 bg-white">
        <div class="px-6 py-4 border-b flex items-center gap-4 flex-wrap">
          <input type="text" placeholder="搜索商品名称..." class="rounded-lg border px-3 py-2 text-sm w-64">
          <select class="rounded-lg border px-3 py-2 text-sm"><option>全部分类</option><option>电子产品</option><option>服装配饰</option><option>家居生活</option></select>
          <select class="rounded-lg border px-3 py-2 text-sm"><option>全部状态</option><option>上架中</option><option>已下架</option></select>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="border-b bg-gray-50"><th class="px-4 py-3 text-left font-medium text-gray-600">商品</th><th class="px-4 py-3 text-left font-medium text-gray-600">分类</th><th class="px-4 py-3 text-left font-medium text-gray-600">价格</th><th class="px-4 py-3 text-left font-medium text-gray-600">库存</th><th class="px-4 py-3 text-left font-medium text-gray-600">销量</th><th class="px-4 py-3 text-left font-medium text-gray-600">状态</th><th class="px-4 py-3 text-left font-medium text-gray-600">操作</th></tr></thead>
            <tbody>
              <tr class="border-t hover:bg-gray-50"><td class="px-4 py-3"><div class="flex items-center gap-3"><div class="h-10 w-10 rounded-lg bg-blue-100 flex items-center justify-center">🎧</div><span class="font-medium">无线蓝牙耳机 Pro</span></div></td><td class="px-4 py-3">电子产品</td><td class="px-4 py-3 font-mono">¥299.00</td><td class="px-4 py-3">56</td><td class="px-4 py-3">1,234</td><td class="px-4 py-3"><span class="rounded-full bg-green-100 px-2 py-0.5 text-xs text-green-700">上架</span></td><td class="px-4 py-3"><button class="text-indigo-600 hover:underline mr-2">编辑</button><button class="text-red-500 hover:underline">下架</button></td></tr>
              <tr class="border-t hover:bg-gray-50"><td class="px-4 py-3"><div class="flex items-center gap-3"><div class="h-10 w-10 rounded-lg bg-green-100 flex items-center justify-center">⌚</div><span class="font-medium">智能手表 S8</span></div></td><td class="px-4 py-3">电子产品</td><td class="px-4 py-3 font-mono">¥599.00</td><td class="px-4 py-3">32</td><td class="px-4 py-3">86</td><td class="px-4 py-3"><span class="rounded-full bg-green-100 px-2 py-0.5 text-xs text-green-700">上架</span></td><td class="px-4 py-3"><button class="text-indigo-600 hover:underline mr-2">编辑</button><button class="text-red-500 hover:underline">下架</button></td></tr>
              <tr class="border-t hover:bg-gray-50"><td class="px-4 py-3"><div class="flex items-center gap-3"><div class="h-10 w-10 rounded-lg bg-pink-100 flex items-center justify-center">📱</div><span class="font-medium">智能手机 S24</span></div></td><td class="px-4 py-3">电子产品</td><td class="px-4 py-3 font-mono">¥3,999.00</td><td class="px-4 py-3">18</td><td class="px-4 py-3">1,234</td><td class="px-4 py-3"><span class="rounded-full bg-green-100 px-2 py-0.5 text-xs text-green-700">上架</span></td><td class="px-4 py-3"><button class="text-indigo-600 hover:underline mr-2">编辑</button><button class="text-red-500 hover:underline">下架</button></td></tr>
              <tr class="border-t hover:bg-gray-50"><td class="px-4 py-3"><div class="flex items-center gap-3"><div class="h-10 w-10 rounded-lg bg-yellow-100 flex items-center justify-center">🔌</div><span class="font-medium">快充充电器 65W</span></div></td><td class="px-4 py-3">电子产品</td><td class="px-4 py-3 font-mono">¥89.00</td><td class="px-4 py-3">120</td><td class="px-4 py-3">520</td><td class="px-4 py-3"><span class="rounded-full bg-green-100 px-2 py-0.5 text-xs text-green-700">上架</span></td><td class="px-4 py-3"><button class="text-indigo-600 hover:underline mr-2">编辑</button><button class="text-red-500 hover:underline">下架</button></td></tr>
              <tr class="border-t hover:bg-gray-50"><td class="px-4 py-3"><div class="flex items-center gap-3"><div class="h-10 w-10 rounded-lg bg-gray-200 flex items-center justify-center">🎒</div><span class="font-medium">运动背包 30L</span></div></td><td class="px-4 py-3">运动户外</td><td class="px-4 py-3 font-mono">¥189.00</td><td class="px-4 py-3">0</td><td class="px-4 py-3">42</td><td class="px-4 py-3"><span class="rounded-full bg-gray-100 px-2 py-0.5 text-xs text-gray-500">下架</span></td><td class="px-4 py-3"><button class="text-indigo-600 hover:underline mr-2">编辑</button><button class="text-green-500 hover:underline">上架</button></td></tr>
            </tbody>
          </table>
        </div>
        <div class="px-6 py-4 border-t flex items-center justify-between text-sm text-gray-500">
          <span>共 48 件商品</span>
          <div class="flex gap-2">
            <span class="px-3 py-1 border rounded-lg">上一页</span>
            <span class="px-3 py-1 bg-indigo-600 text-white rounded-lg">1</span>
            <span class="px-3 py-1 border rounded-lg">2</span>
            <span class="px-3 py-1 border rounded-lg">3</span>
            <span class="px-3 py-1 border rounded-lg">下一页</span>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
