<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分类管理 - Mini Mall Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex">
    <aside class="hidden lg:block fixed left-0 top-0 h-screen w-60 bg-gray-900 text-white">
      <div class="flex h-16 items-center border-b border-gray-700 px-6"><a href="index.html" class="text-lg font-bold">🛍️ Mini Mall Admin</a></div>
      <nav class="mt-4 space-y-1 px-3">
        <a href="admin.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📊 数据面板</a>
        <a href="admin-products.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📦 商品管理</a>
        <a href="admin-categories.html" class="flex items-center gap-3 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm">📂 分类管理</a>
        <a href="admin-orders.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📋 订单管理</a>
        <a href="admin-users.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">👥 用户管理</a>
        <a href="admin-coupons.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">🎫 优惠券管理</a>
        <a href="admin-banners.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">🖼️ 轮播管理</a>
        <a href="admin-reviews.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">⭐ 评价管理</a>
      </nav>
      <div class="absolute bottom-4 left-0 w-full px-3"><a href="index.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white">← 返回商城</a></div>
    </aside>

    <main class="flex-1 lg:ml-60 p-4 lg:p-8">
      <header class="flex items-center justify-between bg-white rounded-xl border px-4 lg:px-8 py-4 mb-6">
        <h1 class="text-lg font-semibold text-gray-800">📂 分类管理</h1>
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm text-white hover:bg-indigo-700" onclick="alert('新增分类（演示）')">+ 新增分类</button>
      </header>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-4 hover:shadow-md transition">
          <span class="text-4xl">📱</span>
          <div class="flex-1"><h3 class="font-bold text-gray-900">电子产品</h3><p class="text-sm text-gray-500">12 件商品</p><p class="text-xs text-gray-400">slug: electronica</p></div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-red-500 text-sm hover:underline">删除</button></div>
        </div>
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-4 hover:shadow-md transition">
          <span class="text-4xl">👕</span>
          <div class="flex-1"><h3 class="font-bold text-gray-900">服装配饰</h3><p class="text-sm text-gray-500">8 件商品</p><p class="text-xs text-gray-400">slug: ropa</p></div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-red-500 text-sm hover:underline">删除</button></div>
        </div>
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-4 hover:shadow-md transition">
          <span class="text-4xl">🏠</span>
          <div class="flex-1"><h3 class="font-bold text-gray-900">家居生活</h3><p class="text-sm text-gray-500">10 件商品</p><p class="text-xs text-gray-400">slug: hogar</p></div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-red-500 text-sm hover:underline">删除</button></div>
        </div>
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-4 hover:shadow-md transition">
          <span class="text-4xl">🍜</span>
          <div class="flex-1"><h3 class="font-bold text-gray-900">食品饮料</h3><p class="text-sm text-gray-500">6 件商品</p><p class="text-xs text-gray-400">slug: alimentos</p></div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-red-500 text-sm hover:underline">删除</button></div>
        </div>
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-4 hover:shadow-md transition">
          <span class="text-4xl">⚽</span>
          <div class="flex-1"><h3 class="font-bold text-gray-900">运动户外</h3><p class="text-sm text-gray-500">12 件商品</p><p class="text-xs text-gray-400">slug: deportes</p></div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-red-500 text-sm hover:underline">删除</button></div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
