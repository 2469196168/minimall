<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购物车 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 px-4">
      <a href="index.html" class="text-xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="products.html" class="text-gray-600 hover:text-indigo-600">继续购物</a>
        <a href="login.html" class="text-indigo-600 font-medium">登录</a>
      </nav>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900">购物车 (3)</h1>

    <div class="mt-6 space-y-4">
      <!-- Item 1 -->
      <div class="flex gap-4 rounded-xl border border-gray-200 bg-white p-4">
        <div class="h-20 w-20 shrink-0 rounded-lg bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center text-3xl">🎧</div>
        <div class="flex-1 min-w-0">
          <h3 class="text-sm font-medium text-gray-900 truncate">无线蓝牙耳机 Pro</h3>
          <p class="mt-1 text-xs text-gray-400">黑色 / 标准版</p>
          <div class="mt-2 flex items-center gap-0 rounded-lg border border-gray-300 w-fit">
            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="const e=this.nextElementSibling;e.textContent=Math.max(1,parseInt(e.textContent)-1)">−</button>
            <span class="px-3 py-1 text-sm font-medium tabular-nums">1</span>
            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="const e=this.previousElementSibling;e.textContent=parseInt(e.textContent)+1">+</button>
          </div>
        </div>
        <div class="text-right flex flex-col items-end justify-between">
          <span class="text-lg font-bold text-red-600">¥299.00</span>
          <button class="text-xs text-red-500 hover:text-red-700">删除</button>
        </div>
      </div>
      <!-- Item 2 -->
      <div class="flex gap-4 rounded-xl border border-gray-200 bg-white p-4">
        <div class="h-20 w-20 shrink-0 rounded-lg bg-gradient-to-br from-green-100 to-green-200 flex items-center justify-center text-3xl">⌚</div>
        <div class="flex-1 min-w-0">
          <h3 class="text-sm font-medium text-gray-900 truncate">智能手表 S8</h3>
          <p class="mt-1 text-xs text-gray-400">午夜色 / 45mm</p>
          <div class="mt-2 flex items-center gap-0 rounded-lg border border-gray-300 w-fit">
            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="const e=this.nextElementSibling;e.textContent=Math.max(1,parseInt(e.textContent)-1)">−</button>
            <span class="px-3 py-1 text-sm font-medium tabular-nums">1</span>
            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="const e=this.previousElementSibling;e.textContent=parseInt(e.textContent)+1">+</button>
          </div>
        </div>
        <div class="text-right flex flex-col items-end justify-between">
          <span class="text-lg font-bold text-red-600">¥599.00</span>
          <button class="text-xs text-red-500 hover:text-red-700">删除</button>
        </div>
      </div>
      <!-- Item 3 -->
      <div class="flex gap-4 rounded-xl border border-gray-200 bg-white p-4">
        <div class="h-20 w-20 shrink-0 rounded-lg bg-gradient-to-br from-yellow-100 to-yellow-200 flex items-center justify-center text-3xl">🔌</div>
        <div class="flex-1 min-w-0">
          <h3 class="text-sm font-medium text-gray-900 truncate">快充充电器 65W</h3>
          <p class="mt-1 text-xs text-gray-400">白色</p>
          <div class="mt-2 flex items-center gap-0 rounded-lg border border-gray-300 w-fit">
            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="const e=this.nextElementSibling;e.textContent=Math.max(1,parseInt(e.textContent)-1)">−</button>
            <span class="px-3 py-1 text-sm font-medium tabular-nums">2</span>
            <button class="px-3 py-1 text-gray-600 hover:bg-gray-100" onclick="const e=this.previousElementSibling;e.textContent=parseInt(e.textContent)+1">+</button>
          </div>
        </div>
        <div class="text-right flex flex-col items-end justify-between">
          <span class="text-lg font-bold text-red-600">¥89.00</span>
          <button class="text-xs text-red-500 hover:text-red-700">删除</button>
        </div>
      </div>
    </div>

    <!-- Summary -->
    <div class="mt-6 rounded-xl border border-gray-200 bg-white p-6">
      <div class="space-y-2 text-sm">
        <div class="flex justify-between"><span class="text-gray-500">商品总计 (4 件)</span><span class="text-gray-900">¥1,076.00</span></div>
        <div class="flex justify-between"><span class="text-gray-500">运费</span><span class="text-green-600">免运费</span></div>
        <hr class="my-2">
        <div class="flex justify-between text-lg font-bold"><span>合计</span><span class="text-red-600">¥1,076.00</span></div>
      </div>
      <a href="checkout.html" class="mt-4 block w-full rounded-lg bg-red-600 px-6 py-3 text-center font-medium text-white hover:bg-red-700 transition">去结算</a>
    </div>
  </div>
</body>
</html>
