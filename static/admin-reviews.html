<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评价管理 - Mini Mall Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex">
    <aside class="hidden lg:block fixed left-0 top-0 h-screen w-60 bg-gray-900 text-white">
      <div class="flex h-16 items-center border-b border-gray-700 px-6"><a href="index.html" class="text-lg font-bold">🛍️ Mini Mall Admin</a></div>
      <nav class="mt-4 space-y-1 px-3">
        <a href="admin.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📊 数据面板</a>
        <a href="admin-products.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📦 商品管理</a>
        <a href="admin-categories.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📂 分类管理</a>
        <a href="admin-orders.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📋 订单管理</a>
        <a href="admin-users.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">👥 用户管理</a>
        <a href="admin-coupons.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">🎫 优惠券管理</a>
        <a href="admin-banners.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">🖼️ 轮播管理</a>
        <a href="admin-reviews.html" class="flex items-center gap-3 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm">⭐ 评价管理</a>
      </nav>
      <div class="absolute bottom-4 left-0 w-full px-3"><a href="index.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white">← 返回商城</a></div>
    </aside>

    <main class="flex-1 lg:ml-60 p-4 lg:p-8">
      <header class="flex items-center justify-between bg-white rounded-xl border px-4 lg:px-8 py-4 mb-6">
        <h1 class="text-lg font-semibold text-gray-800">⭐ 评价管理</h1>
      </header>
      <div class="rounded-xl border border-gray-200 bg-white">
        <div class="px-6 py-4 border-b flex items-center gap-4"><select class="rounded-lg border px-3 py-2 text-sm"><option>全部评分</option><option>5星</option><option>4星</option><option>3星</option><option>2星</option><option>1星</option></select></div>
        <div class="divide-y">
          <div class="p-6 hover:bg-gray-50">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3"><span class="font-medium text-gray-900">张三</span><span class="text-yellow-500">★★★★★</span><span class="text-xs text-gray-400">在 无线蓝牙耳机 Pro</span></div>
              <span class="text-xs text-gray-400">2026-06-15</span>
            </div>
            <p class="mt-2 text-sm text-gray-600">音质很好，降噪效果明显，戴着也舒服。续航确实给力，一周充一次电够用了。</p>
            <button class="mt-2 text-xs text-red-500 hover:underline">删除评价</button>
          </div>
          <div class="p-6 hover:bg-gray-50">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3"><span class="font-medium text-gray-900">李四</span><span class="text-yellow-500">★★★★☆</span><span class="text-xs text-gray-400">在 智能手表 S8</span></div>
              <span class="text-xs text-gray-400">2026-06-10</span>
            </div>
            <p class="mt-2 text-sm text-gray-600">总体不错，续航比上一代好很多。</p>
            <button class="mt-2 text-xs text-red-500 hover:underline">删除评价</button>
          </div>
          <div class="p-6 hover:bg-gray-50">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-3"><span class="font-medium text-gray-900">王五</span><span class="text-yellow-500">★★★☆☆</span><span class="text-xs text-gray-400">在 机械键盘 RGB</span></div>
              <span class="text-xs text-gray-400">2026-06-08</span>
            </div>
            <p class="mt-2 text-sm text-gray-600">手感一般，灯效倒是挺好看的。这个价位还算可以接受。</p>
            <button class="mt-2 text-xs text-red-500 hover:underline">删除评价</button>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
