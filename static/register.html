<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="text-3xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <p class="mt-2 text-sm text-gray-500">创建您的账号</p>
    </div>
    <form class="rounded-2xl border border-gray-200 bg-white p-8 shadow-sm" onsubmit="event.preventDefault();location.href='index.html'">
      <h1 class="text-xl font-bold text-gray-900 text-center">注册</h1>
      <div class="mt-6 space-y-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">昵称</label><input type="text" placeholder="2-20个字符" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label><input type="email" placeholder="请输入邮箱" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">密码</label><input type="password" placeholder="至少6位" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></div>
        <button type="submit" class="w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-medium text-white hover:bg-indigo-700 transition">注册</button>
      </div>
      <p class="mt-4 text-center text-sm text-gray-500">
        已有账号？<a href="login.html" class="text-indigo-600 font-medium hover:underline">立即登录</a>
      </p>
    </form>
  </div>
</body>
</html>
