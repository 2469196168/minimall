<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的收藏 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 px-4">
      <a href="index.html" class="text-xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="products.html" class="text-gray-600 hover:text-indigo-600">全部商品</a>
        <a href="cart.html" class="text-gray-600 hover:text-indigo-600">🛒 购物车</a>
        <a href="login.html" class="text-indigo-600 font-medium">登录</a>
      </nav>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900">我的收藏 (2)</h1>
    <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <div class="rounded-xl border border-gray-200 bg-white p-4 hover:shadow-md transition">
        <div class="flex gap-4">
          <div class="h-24 w-24 shrink-0 rounded-lg bg-gradient-to-br from-blue-100 to-blue-200 flex items-center justify-center text-4xl cursor-pointer" onclick="location.href='product-detail.html'">🎧</div>
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-medium text-gray-900 truncate cursor-pointer hover:text-indigo-600" onclick="location.href='product-detail.html'">无线蓝牙耳机 Pro</h3>
            <div class="mt-1 text-xs text-yellow-500">★★★★★ (128)</div>
            <div class="mt-2 flex items-baseline gap-2"><span class="text-lg font-bold text-red-600">¥299.00</span><span class="text-xs text-gray-400 line-through">¥399.00</span></div>
            <div class="mt-2 flex gap-2">
              <button class="flex-1 rounded-lg bg-indigo-600 px-3 py-1.5 text-xs text-white hover:bg-indigo-700" onclick="alert('已加入购物车！')">加入购物车</button>
              <button class="rounded-lg border border-gray-300 px-3 py-1.5 text-xs text-red-500 hover:bg-red-50">删除</button>
            </div>
          </div>
        </div>
      </div>
      <div class="rounded-xl border border-gray-200 bg-white p-4 hover:shadow-md transition">
        <div class="flex gap-4">
          <div class="h-24 w-24 shrink-0 rounded-lg bg-gradient-to-br from-green-100 to-green-200 flex items-center justify-center text-4xl cursor-pointer" onclick="location.href='product-detail.html'">⌚</div>
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-medium text-gray-900 truncate">智能手表 S8</h3>
            <div class="mt-1 text-xs text-yellow-500">★★★★☆ (86)</div>
            <div class="mt-2 flex items-baseline gap-2"><span class="text-lg font-bold text-red-600">¥599.00</span><span class="text-xs text-gray-400 line-through">¥799.00</span></div>
            <div class="mt-2 flex gap-2">
              <button class="flex-1 rounded-lg bg-indigo-600 px-3 py-1.5 text-xs text-white hover:bg-indigo-700" onclick="alert('已加入购物车！')">加入购物车</button>
              <button class="rounded-lg border border-gray-300 px-3 py-1.5 text-xs text-red-500 hover:bg-red-50">删除</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
