<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <header class="sticky top-0 z-50 bg-white border-b border-gray-200">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 px-4">
      <a href="index.html" class="text-xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <nav class="flex items-center gap-4 text-sm">
        <a href="orders.html" class="text-gray-600 hover:text-indigo-600">📦 我的订单</a>
        <button class="text-gray-600 hover:text-red-600" onclick="location.href='login.html'">退出登录</button>
      </nav>
    </div>
  </header>

  <div class="max-w-3xl mx-auto px-4 py-8">
    <!-- User Card -->
    <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-4">
      <div class="h-16 w-16 rounded-full bg-indigo-100 flex items-center justify-center text-2xl">👤</div>
      <div>
        <h2 class="text-lg font-bold text-gray-900">用户名</h2>
        <p class="text-sm text-gray-500">user@minimall.com</p>
        <p class="text-xs text-gray-400 mt-0.5">注册于 2026-01-15</p>
      </div>
      <a href="#" class="ml-auto text-sm text-indigo-600 hover:underline">编辑资料</a>
    </div>

    <!-- Menu -->
    <div class="mt-4 rounded-xl border border-gray-200 bg-white overflow-hidden">
      <a href="orders.html" class="flex items-center justify-between px-6 py-4 hover:bg-gray-50 border-b"><span>📦 我的订单</span><span class="text-gray-400">→</span></a>
      <a href="wishlist.html" class="flex items-center justify-between px-6 py-4 hover:bg-gray-50 border-b"><span>❤️ 我的收藏</span><span class="text-gray-400">→</span></a>
      <a href="#" class="flex items-center justify-between px-6 py-4 hover:bg-gray-50 border-b"><span>📍 收货地址</span><span class="text-gray-400">→</span></a>
      <a href="#" class="flex items-center justify-between px-6 py-4 hover:bg-gray-50 border-b"><span>🔒 修改密码</span><span class="text-gray-400">→</span></a>
      <a href="admin.html" class="flex items-center justify-between px-6 py-4 hover:bg-gray-50"><span>⚙️ 管理后台</span><span class="text-gray-400">→</span></a>
    </div>
  </div>
</body>
</html>
