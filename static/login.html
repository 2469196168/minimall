<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - Mini Mall</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a href="index.html" class="text-3xl font-bold text-indigo-600">🛍️ Mini Mall</a>
      <p class="mt-2 text-sm text-gray-500">欢迎回来</p>
    </div>
    <form class="rounded-2xl border border-gray-200 bg-white p-8 shadow-sm" onsubmit="event.preventDefault();location.href='index.html'">
      <h1 class="text-xl font-bold text-gray-900 text-center">登录</h1>
      <div class="mt-6 space-y-4">
        <div><label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label><input type="email" placeholder="请输入邮箱" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">密码</label><input type="password" placeholder="请输入密码" class="w-full rounded-lg border border-gray-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"></div>
        <button type="submit" class="w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-medium text-white hover:bg-indigo-700 transition">登录</button>
      </div>
      <p class="mt-4 text-center text-sm text-gray-500">
        还没有账号？<a href="register.html" class="text-indigo-600 font-medium hover:underline">立即注册</a>
      </p>
      <div class="mt-4 rounded-lg bg-gray-50 p-3 text-xs text-gray-500">
        <p class="font-medium mb-1">演示账号：</p>
        <p>管理员：admin@minimall.com / admin123</p>
        <p>用户：user@minimall.com / user123</p>
      </div>
    </form>
  </div>
</body>
</html>
