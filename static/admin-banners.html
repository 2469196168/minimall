<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>轮播管理 - Mini Mall Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="flex">
    <aside class="hidden lg:block fixed left-0 top-0 h-screen w-60 bg-gray-900 text-white">
      <div class="flex h-16 items-center border-b border-gray-700 px-6"><a href="index.html" class="text-lg font-bold">🛍️ Mini Mall Admin</a></div>
      <nav class="mt-4 space-y-1 px-3">
        <a href="admin.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📊 数据面板</a>
        <a href="admin-products.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📦 商品管理</a>
        <a href="admin-categories.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📂 分类管理</a>
        <a href="admin-orders.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">📋 订单管理</a>
        <a href="admin-users.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">👥 用户管理</a>
        <a href="admin-coupons.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">🎫 优惠券管理</a>
        <a href="admin-banners.html" class="flex items-center gap-3 rounded-lg bg-indigo-600 px-4 py-2.5 text-sm">🖼️ 轮播管理</a>
        <a href="admin-reviews.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-300 hover:bg-gray-800">⭐ 评价管理</a>
      </nav>
      <div class="absolute bottom-4 left-0 w-full px-3"><a href="index.html" class="flex items-center gap-3 rounded-lg px-4 py-2.5 text-sm text-gray-400 hover:bg-gray-800 hover:text-white">← 返回商城</a></div>
    </aside>

    <main class="flex-1 lg:ml-60 p-4 lg:p-8">
      <header class="flex items-center justify-between bg-white rounded-xl border px-4 lg:px-8 py-4 mb-6">
        <h1 class="text-lg font-semibold text-gray-800">🖼️ 轮播图管理</h1>
        <button class="rounded-lg bg-indigo-600 px-4 py-2 text-sm text-white hover:bg-indigo-700" onclick="alert('新增轮播（演示）')">+ 新增轮播</button>
      </header>
      <div class="space-y-4">
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-6">
          <div class="h-24 w-40 shrink-0 rounded-lg bg-gradient-to-r from-indigo-500 to-purple-500 flex items-center justify-center text-white text-2xl font-bold">新品首发</div>
          <div class="flex-1">
            <h3 class="font-bold text-gray-900">新品首发大促</h3>
            <p class="text-sm text-gray-500 mt-1">链接: /products</p>
            <div class="mt-2 flex items-center gap-4 text-xs text-gray-500">
              <span>排序: 1</span><span>位置: 首页</span><span>状态: <span class="text-green-600 font-medium">启用</span></span>
            </div>
          </div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-red-500 text-sm hover:underline">禁用</button></div>
        </div>
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-6">
          <div class="h-24 w-40 shrink-0 rounded-lg bg-gradient-to-r from-pink-500 to-rose-500 flex items-center justify-center text-white text-2xl font-bold">限时特惠</div>
          <div class="flex-1">
            <h3 class="font-bold text-gray-900">限时特惠</h3>
            <p class="text-sm text-gray-500 mt-1">链接: /products?sort=discount</p>
            <div class="mt-2 flex items-center gap-4 text-xs text-gray-500">
              <span>排序: 2</span><span>位置: 首页</span><span>状态: <span class="text-green-600 font-medium">启用</span></span>
            </div>
          </div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-red-500 text-sm hover:underline">禁用</button></div>
        </div>
        <div class="rounded-xl border border-gray-200 bg-white p-6 flex items-center gap-6">
          <div class="h-24 w-40 shrink-0 rounded-lg bg-gradient-to-r from-amber-500 to-orange-500 flex items-center justify-center text-white text-2xl font-bold">新品上市</div>
          <div class="flex-1">
            <h3 class="font-bold text-gray-900">新品上市</h3>
            <p class="text-sm text-gray-500 mt-1">链接: /products?sort=newest</p>
            <div class="mt-2 flex items-center gap-4 text-xs text-gray-500">
              <span>排序: 3</span><span>位置: 首页</span><span>状态: <span class="text-red-500">禁用</span></span>
            </div>
          </div>
          <div class="flex gap-2"><button class="text-indigo-600 text-sm hover:underline">编辑</button><button class="text-green-500 text-sm hover:underline">启用</button></div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
